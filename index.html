<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYTHAGLASS | Make Your Life Balanced</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #111111;
            --toxic-green: #CCFF00;
            --neon-pink: #FF007F;
            --bio-orange: #FF5500;
            --deep-purple: #7A00FF;
            --white: #F4F4F0;
            --black: #000000;
        }

        html { scroll-behavior: smooth; }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 이미지 박스 최적화 */
        .img-box {
            background-color: var(--bg-dark);
            border: 4px solid var(--black);
            box-shadow: 8px 8px 0px var(--toxic-green);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0 !important;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 헤더/네비게이션 */
        nav {
            position: sticky;
            top: 0;
            background-color: var(--deep-purple);
            border-bottom: 4px solid var(--black);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .btn {
            display: inline-block;
            background-color: var(--toxic-green);
            color: var(--black);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            padding: 15px 40px;
            text-decoration: none;
            border: 3px solid var(--black);
            border-radius: 50px;
            box-shadow: 6px 6px 0px var(--neon-pink);
            transition: 0.2s;
        }

        .marquee-tape {
            background-color: var(--bio-orange);
            color: var(--black);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            padding: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            border-bottom: 3px solid var(--black);
        }

        .marquee-tape span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        section { padding: 80px 5%; }
        .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .hero h1 { font-family: 'Syne', sans-serif; font-size: 4rem; line-height: 1; }

        .birth-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

        footer { background: var(--black); padding: 40px; text-align: center; border-top: 4px solid var(--toxic-green); }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 800; color: var(--toxic-green);">PYTHAGLASS</div>
        <div class="nav-links"><a href="#shop" style="color: white; text-decoration: none; font-weight: 800;">BUY NOW</a></div>
    </nav>

    <div class="marquee-tape">
        <span>☣ DEFINING SPACE, ONE GRAIN AT A TIME ☣ PYTHAGLASS SURVIVAL KIT ☣</span>
    </div>

    <section class="hero">
        <div>
            <h1>BUY<br>PYTHAGLASS<br>TODAY</h1>
            <p style="margin: 20px 0; color: var(--toxic-green);">MAKE YOUR LIFE BALANCED.</p>
            <a href="#" class="btn">GET ARTIFACT ➔</a>
        </div>
        <!-- 캡쳐 1 위치 -->
        <div class="img-box" style="height: 500px; box-shadow: 12px 12px 0px var(--bio-orange);">
            <img src="images/img1.png" alt="Hero Image">
        </div>
    </section>

    <section id="philosophy" style="background: var(--deep-purple); text-align: center;">
        <h2 style="font-family: 'Syne'; font-size: 2.5rem; margin-bottom: 30px;">VISUAL HARMONY</h2>
        <!-- 캡쳐 2 위치 -->
        <div class="img-box" style="max-width: 800px; height: 300px; margin: 0 auto;">
            <img src="images/img2.png" alt="Ocean">
        </div>
    </section>

    <section>
        <h2 style="text-align: center; margin-bottom: 40px; font-family: 'Syne';">THE BIRTH</h2>
        <!-- 캡쳐 3 위치들 -->
        <div class="birth-grid">
            <div class="img-box" style="height: 300px;"><img src="images/img3.png" alt="Birth 1"></div>
            <div class="img-box" style="height: 300px;"><img src="images/img4.png" alt="Birth 2"></div>
            <div class="img-box" style="height: 300px;"><img src="images/img5.png" alt="Birth 3"></div>
        </div>
    </section>

    <footer>
        <p>© 2026 PYTHAGLASS. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
